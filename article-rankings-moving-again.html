document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 <\u002Fdiv>\n<\u002Farticle>\n\n<section style=\"max-width:1200px;margin:60px auto 100px;padding:0 24px\">\n  <h3 style=\"font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:600;margin:0 0 24px\">More from the blog<\u002Fh3>\n  <div class=\"dp-related\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:24px\">\n    <sc-for list=\"{{ related }}\" as=\"post\" hint-placeholder-count=\"3\">\n      <a href=\"{{ post.href }}\" style=\"background:oklch(0.19 0.012 260);border:1px solid oklch(1 0 0 / 0.08);border-radius:16px;overflow:hidden;display:block;color:oklch(0.95 0.01 260)\" style-hover=\"border-color:oklch(0.84 0.19 142 / 0.4)\">\n        <div style=\"aspect-ratio:16/9;background-image:url('{{ post.image }}');background-size:cover;background-position:center\"><\u002Fdiv>\n        <div style=\"padding:18px\">\n          <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:oklch(0.55 0.015 260);margin-bottom:8px\">{{ post.date }}<\u002Fdiv>\n          <div style=\"font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:600;line-height:1.35\">{{ post.title }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fa>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer style=\"border-top:1px solid oklch(1 0 0 / 0.08);padding:32px 24px\">\n  <div style=\"max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px\">\n    <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px\">Darrel<span style=\"color:oklch(0.84 0.19 142)\">.<\u002Fspan>Pontejo<\u002Fdiv>\n    <div style=\"font-size:13px;color:oklch(0.55 0.015 260)\">© 2026 Darrel Pontejo. Davao City, Philippines.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { menuOpen: false };\n  pageCanvasRef = React.createRef();\n  _cleanups = [];\n\n  posts = {\n    'google-may-2026-core-update': {date:'3-Jun-2026', title:'Google May 2026 Core Update Is Complete — What It Means for Your SEO and AI Search Visibility', image:'https://darrelpontejo.com/wp-content/uploads/2026/06/Google-May-2026-Core-Update-Is-Complete-%E2%80%94-What-It-Means-for-Your-SEO-and-AI-Search-Visibility.png'},\n    'ai-search-optimization-guide': {date:'19-May-2026', title:\"Google Just Published Its First Official AI Search Optimization Guide — Here's What It Actually Says\", image:'https://darrelpontejo.com/wp-content/uploads/2026/05/4-myths22-crossed-out-on-the-right-side.jpg'},\n    'discover-enhanced-profiles': {date:'13-May-2026', title:'Google Is Quietly Testing Enhanced Discover Profiles — Only 54 Publishers Got the Invite', image:'https://darrelpontejo.com/wp-content/uploads/2026/05/discover-featured-v3-teal.jpg'},\n    'ranking-no-longer-enough': {date:'5-May-2026', title:'Ranking Is No Longer Enough — What Actually Drives Visibility in AI Search', image:'https://darrelpontejo.com/wp-content/uploads/2026/05/Ranking-Is-No-Longer-Enough-%E2%80%94-What-Actually-Drives-Visibility-in-AI-Search.png'},\n    'rankings-moving-again': {date:'29-Apr-2026', title:\"Google Search Rankings Are Moving Again — Here's What's Actually Happening\", image:'https://darrelpontejo.com/wp-content/uploads/2026/04/google-ranking-volatility.png'},\n    'personal-branding-seo': {date:'21-Apr-2026', title:'Personal Branding for SEO Professionals', image:'https://darrelpontejo.com/wp-content/uploads/2026/04/personal-branding-seo-professionals-2026.jpg.png'}\n  };\n\n  articles = {\n    'google-may-2026-core-update': {\n      badge:'Core Update · SEO & AI', date:'3-Jun-2026', readTime:'8 min read',\n      title:'Google May 2026 Core Update Is Complete — What It Means for Your SEO and AI Search Visibility',\n      metaTitle:'Google May 2026 Core Update: What It Means for SEO',\n      description:\"Google's May 2026 core update finished rolling out June 2. See what changed in rankings, AI Overview citations, and what to do next.\",\n      keywords:'google core update may 2026',\n      canonical:'https://darrelpontejo.com/article/google-may-2026-core-update',\n      publishedTime:'2026-06-03T02:59:00+00:00', modifiedTime:'2026-06-03T03:01:14+00:00',\n      heroImage:'assets/hero/core-update.jpg',\n      relatedSlugs:['ai-search-optimization-guide','discover-enhanced-profiles','ranking-no-longer-enough'],\n      blocks:[\n        {isParagraph:true, text:\"The Google May 2026 Core Update is done. After 12 days of elevated ranking volatility across verticals and countries, the rollout confirmed complete on June 2, 2026. Now the real work begins — understanding what moved, why it moved, and what to actually do about it.\"},\n        {isParagraph:true, text:\"Core updates make the SEO industry nervous, and this one earned that reaction. Multiple practitioners described the May 2026 update as more impactful than the March 2026 update that preceded it just six weeks earlier. If your traffic looks different than it did two weeks ago, this update is almost certainly part of the explanation.\"},\n        {isParagraph:true, text:\"But before making changes, it's worth understanding exactly what happened, what the data is actually telling you, and what Google's own guidance says to do next. Reactive decisions made immediately after a core update rollout are one of the most common — and costly — mistakes site owners make.\"},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'For broader context on where Google\\u2019s ranking systems are heading in 2026, see my post on '},{href:'/blog', text:'the future of search and AI platforms in 2026'},{plain:true, text:' — this update is the latest chapter in a longer directional shift that has been building all year.'}]},\n        {isHeading:true, text:'The complete rollout timeline'},\n        {isStats:true, items:[{val:'12', label:'Days from launch (May 21) to completion (June 2)'}, {val:'43', label:'Days between March 2026 completion and May 2026 launch'}, {val:'June 9', label:\"Earliest reliable Search Console comparison date\"}]},\n        {isParagraph:true, text:\"Google confirmed the update started May 21 at 8:43am Pacific, with an estimated completion window of roughly two weeks. Early volatility hit within the first weekend across multiple tracking tools, with impact reported across verticals and countries. Volatility stayed elevated through the following week before ranking signals approached their final state and the rollout was confirmed complete on June 2 — the second core update of 2026, arriving just 43 days after March's finished.\"},\n        {isHeading:true, text:'What actually happened during the rollout'},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'As '},{href:'https://www.searchenginejournal.com/googles-may-core-update-complete-after-volatile-rollout/577704/', text:\"Search Engine Journal's coverage of the completion\"},{plain:true, text:\" noted, ranking data moved at multiple distinct points across the rollout, not just at the start and finish — meaning a site that moved on May 24 may need a different read than one that moved on June 2, since the causes aren't necessarily the same.\"}]},\n        {isParagraph:true, text:\"Early pattern analysis suggests AI-generated content without meaningful human editing took heavier hits than in previous updates, while sites with named expert authorship, original first-party content, and clear topical authority showed stronger resilience.\"},\n        {isQuote:true, text:\"A negative rankings impact does not mean anything is wrong with your pages — it means Google has shifted the weighting of its evaluation signals, not penalized your content.\"},\n        {isHeading:true, text:'Traditional SEO: what this means for your rankings'},\n        {isParagraph:true, text:\"Core updates aren't surgical — they don't target individual pages or apply manual penalties. They recalibrate quality-signal weighting across the entire index, so a page that ranked well before can lose ground simply because other content in its category raised the bar. The consistent theme across 2026's updates so far is the continued reward of genuine expertise and direct experience, while content that aggregates or reproduces existing information without adding value keeps losing ground.\"},\n        {isList:true, items:[\n          {n:'1', lead:'Wait until June 9 before drawing conclusions.', rest:\"Google points to this as the earliest reliable Search Console comparison window — rankings may still be settling before then.\"},\n          {n:'2', lead:'Segment your data carefully.', rest:'Compare performance by page type, query category, device, and country — a drop concentrated in one category tells a different story than a sitewide decline.'},\n          {n:'3', lead:'Audit affected pages for E-E-A-T signals.', rest:\"Does the page demonstrate first-hand experience? Is the author's expertise visible? Does it add something a dozen similar pages couldn't?\"},\n          {n:'4', lead:\"Don't make reactive structural changes.\", rest:'Changing site architecture or URLs during the settling period can introduce new volatility on top of the update itself.'},\n          {n:'5', lead:'Identify what improved, not just what dropped.', rest:'Pages that gained in your niche are showing you the current quality bar — analyze winners as rigorously as losers.'}\n        ]},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'I covered this recovery framework in more depth in my post on '},{href:'/blog', text:'multi-platform SEO strategy'},{plain:true, text:' — diversifying visibility across channels matters most during periods of core-update volatility, when relying on a single search surface raises your risk.'}]},\n        {isHeading:true, text:'AI search visibility: why this update affects your AI citations too'},\n        {isParagraph:true, text:\"The same ranking systems that determine your position in traditional organic search also determine whether you get cited in AI Overviews and AI Mode. One index, one quality evaluation framework, two surfaces drawing from the same pool. That means this update recalibrated the signals behind AI citations at the same time as traditional rankings — a site that lost ground here has likely lost AI citation ground too, and vice versa.\"},\n        {isParagraph:true, text:\"Google's official AI optimization guide, published six days before this update launched, confirmed that AI features on Search are rooted in core Search ranking and quality systems — this update is, in part, a recalibration of the signals those AI features rely on.\"},\n        {isList:true, items:[\n          {n:'1', lead:'Treat core-update recovery as AI-visibility recovery too.', rest:'Improving E-E-A-T signals and content depth strengthens both traditional rankings and AI citation odds.'},\n          {n:'2', lead:'Prioritize non-commodity content on your highest-value pages.', rest:'Original research, documented case studies, and genuine professional experience earn both ranking recovery and AI citation.'},\n          {n:'3', lead:'Monitor AI citation rate alongside organic rankings.', rest:'A gap between the two tells you something specific about where content quality still falls short.'},\n          {n:'4', lead:'Check your structured data and product feeds.', rest:'These are direct inputs into AI Mode responses and are evaluated through the same quality lens as organic content.'}\n        ]},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'I covered this connection in depth in '},{href:'/article/ranking-no-longer-enough', text:'what actually drives visibility in AI search'},{plain:true, text:' — mention order, depth of explanation, authority framing, and comparative positioning all flow from the same foundational quality signals this update is recalibrating.'}]},\n        {isHeading:true, text:'The bigger pattern: what 2026 is telling us'},\n        {isParagraph:true, text:\"This update arrived just 43 days after March's completed — one of the tightest inter-update windows in recent memory. Combined with Google's AI optimization guide and the Google I/O 2026 announcements aligning ranking systems with AI-powered search, a clear picture is emerging: Google is progressively aligning its ranking and quality systems with the requirements of AI-driven search, not running isolated quality refreshes.\"},\n        {isLinkedParagraph:true, segments:[{plain:true, text:\"The brands absorbing these updates without major disruption aren't the ones reacting fastest to each rollout — they're the ones who built genuine authority and content depth before the updates arrived, exactly the positioning strategy I outlined in \"},{href:'/article/personal-branding-seo', text:'personal branding for SEO professionals'},{plain:true, text:'.'}]}\n      ],\n      faqs:[\n        {q:'When did the Google May 2026 Core Update start and finish?', a:'It began on May 21, 2026 at approximately 8:43am Pacific Time and completed on June 2, 2026 — a rollout of approximately 12 days.'},\n        {q:'How significant was the May 2026 update compared to March 2026?', a:'Multiple SEO practitioners described it as more impactful, with impact reported across verticals and countries within the first weekend.'},\n        {q:'What should I do if the update negatively affected my site?', a:\"Avoid reactive changes. The earliest reliable comparison window in Search Console is June 9, 2026. Wait for rankings to stabilize, then audit for E-E-A-T signals, original expertise, and genuine depth.\"},\n        {q:'Does the update affect AI search visibility?', a:\"Yes — the same core ranking systems underpin both traditional results and AI Overviews. Content rewarded by this update also earns AI citations, so recovering rankings strengthens AI visibility too.\"},\n        {q:'What content was most affected?', a:'Early analysis points to aggregator-style and lightly-edited AI-generated content taking heavier hits, while sites with named expert authorship and original content showed stronger resilience.'},\n        {q:'When is the earliest I should analyze my Search Console data?', a:'June 9, 2026 — one full week after rollout completion. Before that, ranking movements may still be settling.'}\n      ],\n      references:[\n        {n:1, label:'Google May 2026 Core Update Rollout Is Now Complete', source:'Search Engine Land', href:'https://searchengineland.com/google-may-2026-core-update-rollout-is-now-complete-479119'},\n        {n:2, label:\"Google's May Core Update Complete After Volatile Rollout\", source:'Search Engine Journal', href:'https://www.searchenginejournal.com/googles-may-core-update-complete-after-volatile-rollout/577704/'},\n        {n:3, label:'Optimizing Your Website for Generative AI Features on Google Search', source:'Google Search Central', href:'https://developers.google.com/search/docs/fundamentals/ai-optimization-guide'},\n        {n:4, label:'The Future of Search: A Complete Guide to SEO and AI Platforms in 2026', source:'darrelpontejo.com', href:'/blog'},\n        {n:5, label:'Ranking Is No Longer Enough — What Actually Drives Visibility in AI Search', source:'darrelpontejo.com', href:'/article/ranking-no-longer-enough'},\n        {n:6, label:'Multi-Platform SEO Strategy Guide', source:'darrelpontejo.com', href:'/blog'},\n        {n:7, label:'Personal Branding for SEO Professionals', source:'darrelpontejo.com', href:'/article/personal-branding-seo'}\n      ]\n    },\n    'ai-search-optimization-guide': {\n      badge:'AI Search · Official Guidance', date:'19-May-2026', readTime:'8 min read',\n      title:\"Google Just Published Its First Official AI Search Optimization Guide — Here's What It Actually Says\",\n      metaTitle:\"Google's AI Search Optimization Guide, Explained\",\n      description:\"Google published its first official AI search optimization guide on May 15, 2026. See the 4 pillars it says actually drive AI Overview visibility.\",\n      keywords:'AI search optimization guide',\n      canonical:'https://darrelpontejo.com/article/ai-search-optimization-guide',\n      publishedTime:'2026-05-19T02:56:44+00:00', modifiedTime:'2026-05-19T02:56:46+00:00',\n      heroImage:'assets/hero/ai-search-guide.jpg',\n      relatedSlugs:['google-may-2026-core-update','discover-enhanced-profiles','ranking-no-longer-enough'],\n      blocks:[\n        {isParagraph:true, text:\"For two years, the SEO industry debated AEO, GEO, AI chunking, and a growing list of supposed strategies for AI search. On May 15, 2026, Google put most of that conversation to rest in a single official document.\"},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'The new guide, published through '},{href:'https://developers.google.com/search/docs/fundamentals/ai-optimization-guide', text:'Google Search Central'},{plain:true, text:\", is the first time Google has published a consolidated, official resource specifically addressing how content surfaces — or fails to surface — inside AI Overviews and AI Mode.\"}]},\n        {isHeading:true, text:'The core message: AI search is still search'},\n        {isQuote:true, text:'\"The best practices for SEO continue to be relevant because our generative AI features on Google Search are rooted in our core Search ranking and quality systems.\"'},\n        {isParagraph:true, text:\"Google states directly that AEO and GEO are not separate disciplines — they're SEO applied to an AI environment, drawing on the same core ranking and quality systems that have always determined visibility. The technical mechanism behind this is retrieval-augmented generation: AI responses retrieve indexed pages from the same search index and use them to ground the answer, including through query fan-out, where the system silently generates related sub-queries to build a comprehensive answer.\"},\n        {isHeading:true, text:'The 4 pillars Google wants you to focus on'},\n        {isList:true, items:[\n          {n:'1', lead:'Non-commodity content.', rest:\"Direct experience, original research, and perspectives that can't be replicated from a desk — not generic content assembled from widely available information.\"},\n          {n:'2', lead:'Local, shopping & rich media.', rest:'Merchant Center feeds, Google Business Profiles, images, and video are direct inputs into AI responses for commercial and local queries.'},\n          {n:'3', lead:'Core technical SEO.', rest:'Indexability, crawlability, page experience, and clear site structure remain the foundation.'},\n          {n:'4', lead:'Agentic readiness.', rest:'A forward-looking pillar on AI agents that browse, compare, and transact on behalf of users.'}\n        ]},\n        {isStats:true, items:[{val:'48%', label:'Of Google searches in March 2026 showed an AI answer at the top'}, {val:'May 15', label:'2026 — date Google published the guide'}, {val:'1', label:'Shared ranking system between traditional search and AI features'}]},\n        {isHeading:true, text:'What Google says to stop doing'},\n        {isParagraph:true, text:\"The guide explicitly dismisses several widely-circulated tactics: creating llms.txt files or AI-specific markup, chunking content specifically for LLM consumption, rewriting content in an unnatural style for AI systems, and seeking inauthentic brand mentions. None of these are supported by how Google's systems actually work — AI Overviews and AI Mode read the same content users and Googlebot already read.\"},\n        {isHeading:true, text:'What you should actually do right now'},\n        {isList:true, items:[\n          {n:'1', lead:'Audit content for commodity vs. non-commodity signals.', rest:'Could an AI summarize this page without needing to cite you specifically? If yes, it needs original research or documented experience added.'},\n          {n:'2', lead:'Confirm your indexing and crawling foundations are clean.', rest:'AI features draw from the same index as traditional search — technical issues block both equally.'},\n          {n:'3', lead:'Update your Business Profile and Merchant Center feeds.', rest:'Treat them as editorial content; their detail directly affects how AI represents your business.'},\n          {n:'4', lead:'Stop investing time in dismissed tactics.', rest:'Redirect effort from llms.txt or AI-specific rewriting toward genuine content depth and structured data.'},\n          {n:'5', lead:'Begin an accessibility review with agents in mind.', rest:\"Review your site's DOM structure, navigation clarity, and accessibility tree.\"}\n        ]},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'This connects to what I covered in '},{href:'/article/personal-branding-seo', text:'personal branding for SEO professionals'},{plain:true, text:' — genuine expertise and lived experience are the content inputs that make AI citation possible in the first place.'}]}\n      ],\n      faqs:[\n        {q:\"What is Google's official position on AEO and GEO?\", a:\"They aren't separate disciplines — both are SEO applied to an AI environment, using the same core ranking systems as traditional search.\"},\n        {q:'Do I need an llms.txt file?', a:'No. Google states AI Overviews and AI Mode read the same content that users and Googlebot already read.'},\n        {q:'What is non-commodity content?', a:\"Content built on direct experience, original research, or perspective that can't be replicated from a desk — the opposite of generic, widely-duplicated information.\"},\n        {q:\"How does AI Mode use local and commercial data?\", a:'It sources this directly from Merchant Center feeds and Google Business Profiles, not inferred purely from website content.'},\n        {q:'Do I need to prepare for AI agents right now?', a:'Not urgently, but reviewing your DOM structure, accessibility tree, and navigation clarity is a low-risk investment that compounds over time.'}\n      ],\n      references:[\n        {n:1, label:'Optimizing Your Website for Generative AI Features on Google Search', source:'Google Search Central', href:'https://developers.google.com/search/docs/fundamentals/ai-optimization-guide'},\n        {n:2, label:\"Google's New AI Search Guide Calls AEO and GEO 'Still SEO'\", source:'Search Engine Journal', href:'https://www.searchenginejournal.com/googles-new-ai-search-guide-calls-aeo-and-geo-still-seo/575026/'},\n        {n:3, label:'Google Publishes Guide on Optimizing for Generative AI Features', source:'Search Engine Land', href:'https://searchengineland.com/google-publishes-guide-on-optimizing-for-generative-ai-features-477671'},\n        {n:4, label:\"Google's New Guide for AI Search: What SEO Really Needs Now\", source:'PPC Land', href:'https://ppc.land/googles-new-guide-for-ai-search-what-seo-really-needs-now/'},\n        {n:5, label:'Personal Branding for SEO Professionals', source:'darrelpontejo.com', href:'/article/personal-branding-seo'},\n        {n:6, label:'Multi-Platform SEO Strategy Guide', source:'darrelpontejo.com', href:'/blog'}\n      ]\n    },\n    'discover-enhanced-profiles': {\n      badge:'Google Discover · Publisher Tools', date:'13-May-2026', readTime:'6 min read',\n      title:'Google Is Quietly Testing Enhanced Discover Profiles — Only 54 Publishers Got the Invite',\n      metaTitle:'Google Discover Enhanced Profiles: New Publisher Tools',\n      description:\"Google is quietly testing enhanced Discover profiles with custom banners, pinned posts, and configurable links — but only 54 publishers have access.\",\n      keywords:'google discover profiles',\n      canonical:'https://darrelpontejo.com/article/discover-enhanced-profiles',\n      publishedTime:'2026-05-13T00:19:27+00:00', modifiedTime:'2026-05-13T00:23:44+00:00',\n      heroImage:'assets/hero/discover-profiles.jpg',\n      relatedSlugs:['ai-search-optimization-guide','google-may-2026-core-update','ranking-no-longer-enough'],\n      blocks:[\n        {isParagraph:true, text:\"Google has quietly handed a small group of publishers something the rest of the industry has never had: direct control over how their brand appears inside Google Discover. No public announcement, no application form — just an invitation, and a set of new tools most publishers don't know exist yet.\"},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'The findings come from '},{href:'https://searchengineland.com/google-publishers-control-discover-profiles-477217', text:'an analysis by Sylvain Deaure of 1492.vision'},{plain:true, text:', who monitored nearly 47,000 publishers across seven languages through recurring snapshots of profile metadata between March and May 2026.'}]},\n        {isHeading:true, text:'What the enhanced profiles actually include'},\n        {isParagraph:true, text:\"Standard Discover profiles are entirely Google-controlled — publishers cannot edit them, reorder elements, or add branding. The 54 publishers in this pilot have something fundamentally different.\"},\n        {isList:true, items:[\n          {n:'1', lead:'Custom banner image.', rest:'The first time visual branding has been possible inside a Discover profile.'},\n          {n:'2', lead:'Configurable links shelf.', rest:'A curated row of links publishers control — ordering, destination, and presentation.'},\n          {n:'3', lead:'Pinned posts.', rest:\"The ability to surface specific articles at the top of the profile feed, previously called 'Featured Posts.'\"},\n          {n:'4', lead:'Custom tab ordering.', rest:\"Publishers decide the sequence of social links, website, and content tabs — not Google's algorithmic default.\"}\n        ]},\n        {isStats:true, items:[{val:'46,926', label:'Total publishers monitored across 7 languages'}, {val:'54', label:'Publishers with confirmed enhanced profile access'}, {val:'0', label:'Enhanced profiles found outside English-language markets'}]},\n        {isQuote:true, text:\"On claimed profiles, the \\\"Profile generated by Google\\\" label disappears entirely — a quiet but meaningful signal that ownership has shifted from Google to the publisher.\"},\n        {isParagraph:true, text:\"Google Discover can generate between 3 million and 30 million clicks per day for a single publisher — volumes that routinely exceed what the same publication earns from traditional search. Control over how a brand appears in that environment is a distribution and brand-authority lever, not a cosmetic upgrade.\"},\n        {isHeading:true, text:'What all publishers should do before wider rollout'},\n        {isList:true, items:[\n          {n:'1', lead:'Audit your structured data immediately.', rest:'Discover profile social links are pulled directly from your sameAs and JSON-LD markup — fix errors now, before access arrives.'},\n          {n:'2', lead:'Verify what Google currently displays for your publication.', rest:'Search your publication name and document discrepancies as a priority fix list.'},\n          {n:'3', lead:'Decide your brand management model before you need it.', rest:'Centralized vs. station-level presentation is a decision worth making deliberately.'},\n          {n:'4', lead:\"Ensure images meet Discover's visual requirements.\", rest:'Featured images need to be at least 1,200 pixels wide.'},\n          {n:'5', lead:'Build your E-E-A-T signals proactively.', rest:'The February 2026 Discover update moved the platform toward rewarding topic expertise and originality, not just engagement.'}\n        ]},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'This ties directly to what I covered in '},{href:'/article/personal-branding-seo', text:'personal branding for SEO professionals'},{plain:true, text:' — author authority and publication credibility reinforce each other, and Discover is now measuring both.'}]}\n      ],\n      faqs:[\n        {q:'What are enhanced Google Discover profiles?', a:'A pilot program giving 54 hand-selected publishers direct control over their Discover profile — custom banners, a configurable links shelf, pinned posts, and custom tab ordering.'},\n        {q:'How many publishers currently have access?', a:'54, out of nearly 47,000 monitored across seven languages, and all confirmed cases are in English-language markets.'},\n        {q:'How much traffic can Google Discover drive?', a:'Between 3 million and 30 million clicks per day for a single publisher — often exceeding what the same site earns from traditional search.'},\n        {q:'What should publishers do to prepare?', a:'Audit structured data and sameAs markup, verify their current Discover appearance, decide on a brand presentation model, meet the 1,200px image requirement, and build E-E-A-T signals proactively.'},\n        {q:'Is this rolling out to all publishers?', a:'There is no public timeline, but the underlying profile architecture already exists for all monitored publishers, suggesting the feature is built to scale beyond the initial pilot.'}\n      ],\n      references:[\n        {n:1, label:'Google Quietly Gave 54 Publishers Control Over Their Discover Profiles', source:'Search Engine Land', href:'https://searchengineland.com/google-publishers-control-discover-profiles-477217'},\n        {n:2, label:\"Google's February 2026 Discover Core Update: What the Data Actually Shows\", source:'ALM Corp', href:'https://almcorp.com/blog/google-discover-core-update-february-2026-local-publishers-data/'},\n        {n:3, label:'Google To Allow Publishers To Claim Google Discover Profiles?', source:'Search Engine Roundtable', href:'https://www.seroundtable.com/google-discover-claim-profiles-41009.html'},\n        {n:4, label:'Personal Branding for SEO Professionals', source:'darrelpontejo.com', href:'/article/personal-branding-seo'},\n        {n:5, label:'Multi-Platform SEO Strategy Guide', source:'darrelpontejo.com', href:'/blog'}\n      ]\n    },\n    'ranking-no-longer-enough': {\n      badge:'AI Search · Visibility Signals', date:'5-May-2026', readTime:'7 min read',\n      title:'Ranking Is No Longer Enough — What Actually Drives Visibility in AI Search',\n      metaTitle:'AI Overview Citations vs. Rankings: What Changed',\n      description:\"Only 38% of pages cited in Google AI Overviews now rank in the top 10, down from 76%. Here's what actually drives AI search visibility instead.\",\n      keywords:'AI overview citations',\n      canonical:'https://darrelpontejo.com/article/ranking-no-longer-enough',\n      publishedTime:'2026-05-05T01:31:26+00:00', modifiedTime:'2026-05-05T01:31:53+00:00',\n      heroImage:'assets/hero/ranking-not-enough.jpg',\n      relatedSlugs:['google-may-2026-core-update','ai-search-optimization-guide','rankings-moving-again'],\n      blocks:[\n        {isParagraph:true, text:\"For two decades, a higher ranking meant more visibility. That relationship is breaking down fast. AI search has inserted a new decision layer between your content and your audience — and it plays by a completely different set of rules.\"},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'The clearest signal comes from '},{href:'https://ahrefs.com/blog/ai-overview-citations-top-10/', text:'Ahrefs'},{plain:true, text:\", which found that only 38% of pages cited inside Google AI Overviews also held a position in the traditional top ten — down from 76% just eight months earlier. In under a year, the correlation between ranking and being cited dropped by half.\"}]},\n        {isHeading:true, text:'The 4 signals that now determine AI search visibility'},\n        {isList:true, items:[\n          {n:'1', lead:'Mention order.', rest:\"Where your brand appears in an AI-generated list directly shapes how many users choose you — up to 74% pick the AI's top recommendation without exploring further.\"},\n          {n:'2', lead:'Depth of explanation.', rest:\"Whether AI gives you one sentence or a full paragraph depends on how much substantive, citation-worthy content exists about you.\"},\n          {n:'3', lead:'Authority signals.', rest:'The language AI uses to describe you — \"industry standard\" vs. \"growing alternative\" — reflects perceived authority.'},\n          {n:'4', lead:'Comparative positioning.', rest:'How you are framed against competitors shapes which users self-select toward you.'}\n        ]},\n        {isStats:true, items:[{val:'10.18', label:'Avg. ChatGPT citations for content over 20,000 characters'}, {val:'2.39', label:'Avg. citations for content under 500 characters'}, {val:'38%', label:'AI Overview citations that overlap with top-10 rankings'}]},\n        {isParagraph:true, text:\"The mechanism driving this decoupling is query fan-out: AI systems silently decompose a query into multiple sub-queries, retrieve relevant passages across the index for each, and synthesize them into one answer. A page ranking first for the top-level query may never be evaluated if the AI's sub-queries pull from adjacent angles your content doesn't address.\"},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'This is exactly why I placed such emphasis on diversifying content in my post on '},{href:'/blog', text:'multi-platform SEO strategy'},{plain:true, text:\" — a strategy built only around primary keyword ranking increasingly misses the sub-query retrieval layer where AI visibility is actually determined.\"}]},\n        {isHeading:true, text:'What you should actually be measuring now'},\n        {isList:true, items:[\n          {n:'1', lead:'Citation frequency.', rest:'How often your brand appears when AI systems answer questions in your category — the primary AI visibility metric.'},\n          {n:'2', lead:'Brand mention rate.', rest:'What percentage of AI-generated answers in your category include your brand — above 70% is strong, below 30% signals a gap.'},\n          {n:'3', lead:'Recommendation rate.', rest:'Being actively recommended carries more weight than appearing in a general list.'},\n          {n:'4', lead:'Sentiment and framing.', rest:'How AI describes you — premium or budget, advanced or entry-level — shapes purchase intent.'},\n          {n:'5', lead:'Citation position within answers.', rest:'First-cited status is achievable without a top organic ranking and carries comparable influence.'}\n        ]}\n      ],\n      faqs:[\n        {q:'Is ranking position still important?', a:'Yes, but it is no longer sufficient on its own — the overlap between top-10 rankings and AI Overview citations has dropped from 76% to 38% in under a year.'},\n        {q:'What is query fan-out?', a:'The process by which AI systems silently decompose a query into multiple sub-queries and retrieve content across the index for each one before synthesizing an answer.'},\n        {q:'How much has the AI-citation/ranking overlap dropped?', a:'From 76% to 38% in roughly eight months, according to Ahrefs.'},\n        {q:'What should I track instead of just ranking position?', a:'Citation frequency, brand mention rate, recommendation rate, sentiment/framing, and citation position within AI answers.'},\n        {q:'Does brand recognition matter more than AI mention order?', a:'For roughly 26% of users, yes — strong brand familiarity can outperform an AI\\u2019s default ordering.'}\n      ],\n      references:[\n        {n:1, label:'4 Signals That Now Define Visibility in AI Search', source:'Search Engine Land', href:'https://searchengineland.com/visibility-ai-search-signals-475863'},\n        {n:2, label:'AI Overview Citations vs. Top 10 Rankings — The Overlap Is Shrinking', source:'Ahrefs Blog', href:'https://ahrefs.com/blog/ai-overview-citations-top-10/'},\n        {n:3, label:'The Science of How AI Picks Its Sources', source:'Growth Memo', href:'https://www.growth-memo.com/p/the-science-of-how-ai-picks-its-sources'},\n        {n:4, label:\"Gemini 3's Impact on AI Overviews and Citation Patterns\", source:'SE Ranking', href:'https://seranking.com/blog/gemini-3-impact-on-ai-overviews/'},\n        {n:5, label:'Multi-Platform SEO Strategy Guide', source:'darrelpontejo.com', href:'/blog'},\n        {n:6, label:'Personal Branding for SEO Professionals', source:'darrelpontejo.com', href:'/article/personal-branding-seo'}\n      ]\n    },\n    'rankings-moving-again': {\n      badge:'Core Update · Ranking Volatility', date:'29-Apr-2026', readTime:'6 min read',\n      title:\"Google Search Rankings Are Moving Again — Here's What's Actually Happening\",\n      metaTitle:\"Google Ranking Volatility: What's Happening in 2026\",\n      description:\"SEO tools flagged elevated Google ranking volatility in late April 2026, even after the March core update wrapped. Here's what's driving it.\",\n      keywords:'google ranking volatility',\n      canonical:'https://darrelpontejo.com/article/rankings-moving-again',\n      publishedTime:'2026-04-29T00:00:00+00:00', modifiedTime:'2026-04-29T00:00:00+00:00',\n      heroImage:'assets/hero/rankings-moving.png',\n      relatedSlugs:['personal-branding-seo','ranking-no-longer-enough','google-may-2026-core-update'],\n      blocks:[\n        {isParagraph:true, text:\"If your organic traffic has been erratic over the past few weeks, you're not imagining it. Towards the end of April 2026, several independent SEO tracking platforms began registering elevated ranking movement — and the timing caught attention precisely because the March 2026 Core Update had already wrapped up on April 8, yet the tools kept showing instability.\"},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'According to '},{href:'https://www.seroundtable.com/google-search-ranking-volatility-heating-up-41205.html', text:\"Search Engine Roundtable's coverage of the April 23 signals\"},{plain:true, text:', platforms including Semrush, Advanced Web Rankings, Wincher, Accuranker, Sistrix, Zutrix, and Mangools were all reporting higher-than-normal movement simultaneously — the kind of multi-tool consensus treated as a reliable signal of real, widespread shifts.'}]},\n        {isHeading:true, text:'A year of back-to-back disruption'},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'The current volatility doesn\\u2019t exist in isolation. '},{href:'https://ppc.land/march-2026-google-core-update-hit-aggregators-harder-than-december/', text:'SE Ranking data shared with Search Engine Land'},{plain:true, text:\" found that during the March cycle, nearly 80% of pages in the top three positions changed rankings, and roughly one in four pages that had been in the top ten dropped out of the top one hundred entirely.\"}]},\n        {isQuote:true, text:\"Independent analysis found a consistent directional shift: search visibility moving away from aggregator-style sites and toward stronger destination sources — authoritative, brand-owned, and specialist pages.\"},\n        {isParagraph:true, text:\"Part of the picture is structural, not purely algorithmic. Even sites holding their ranking positions are seeing fewer clicks in 2026, because AI Overviews now appear above organic results for a growing range of queries — Ahrefs found AI Overviews correlated with a 58% drop in click-through rate for pages directly beneath them, up from 34.5% in April 2025.\"},\n        {isHeading:true, text:'What you should actually do right now'},\n        {isList:true, items:[\n          {n:'1', lead:'Segment your data in Search Console.', rest:'By page type, device, and country before drawing any conclusions — a regional drop has a very different cause than a sitewide decline.'},\n          {n:'2', lead:'Hold off on broad structural changes.', rest:'Volatility phases often self-correct over two to three weeks; acting impulsively can cause more disruption than the fluctuation itself.'},\n          {n:'3', lead:'Audit your most important pages against quality criteria.', rest:'Core updates consistently reward content demonstrating direct experience, genuine expertise, and clear usefulness.'},\n          {n:'4', lead:'Strengthen internal linking.', rest:'Clear internal links help Google re-evaluate relative page authority accurately during index recalibration.'},\n          {n:'5', lead:\"Don't conflate volatility with a manual action.\", rest:'If Search Console shows no manual action notice, address this through sustained content improvements, not reconsideration requests.'}\n        ]},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'For SEO professionals especially, personal authority online now feeds directly into client outcomes — I wrote about this in '},{href:'/article/personal-branding-seo', text:'personal branding for SEO professionals'},{plain:true, text:'.'}]}\n      ],\n      faqs:[\n        {q:'Why are rankings still moving after the March core update ended?', a:\"Multiple tracking tools showed continued instability after April 8, consistent with late-stage recalibration or a broader traffic redistribution rather than a new named update.\"},\n        {q:'Is this a new penalty?', a:'No — Google confirmed core updates roll out in components pushed step by step, which is why volatility during and after a rollout often appears uneven and wave-like.'},\n        {q:'How much did rankings shift during the March 2026 update?', a:'Nearly 80% of top-3 pages changed position, and about 1 in 4 previously top-10 pages dropped out of the top 100 entirely.'},\n        {q:'Do AI Overviews reduce traffic even without a ranking loss?', a:'Yes — AI Overviews correlated with a 58% drop in click-through rate for pages directly beneath them, up from 34.5% a year earlier.'},\n        {q:'What should I do during a volatility period?', a:'Segment Search Console data, avoid reactive structural changes, audit content quality, strengthen internal linking, and confirm there is no manual action before assuming a penalty.'}\n      ],\n      references:[\n        {n:1, label:'Google Search Ranking Volatility Heating Up — April 23rd', source:'Search Engine Roundtable', href:'https://www.seroundtable.com/google-search-ranking-volatility-heating-up-41205.html'},\n        {n:2, label:'March 2026 Google Core Update Hit Aggregators Harder Than December', source:'PPC Land', href:'https://ppc.land/march-2026-google-core-update-hit-aggregators-harder-than-december/'},\n        {n:3, label:'Personal Branding for SEO Professionals', source:'darrelpontejo.com', href:'/article/personal-branding-seo'},\n        {n:4, label:'Multi-Platform SEO Strategy Guide', source:'darrelpontejo.com', href:'/blog'}\n      ]\n    },\n    'personal-branding-seo': {\n      badge:'Personal Branding · Authority', date:'21-Apr-2026', readTime:'5 min read',\n      title:'Personal Branding for SEO Professionals: How to Build Authority in 2026',\n      metaTitle:'Personal Branding for SEO Professionals in 2026',\n      description:\"AI systems evaluate who created content, not just what it says. Here's how SEO professionals build a personal brand that earns trust and citations.\",\n      keywords:'personal branding for SEO',\n      canonical:'https://darrelpontejo.com/article/personal-branding-seo',\n      publishedTime:'2026-04-21T15:39:21+00:00', modifiedTime:'2026-04-21T15:39:22+00:00',\n      heroImage:'assets/hero/personal-branding.jpg',\n      relatedSlugs:['rankings-moving-again','ai-search-optimization-guide','google-may-2026-core-update'],\n      blocks:[\n        {isParagraph:true, text:\"In today's evolving search landscape, technical skill alone is no longer enough. AI systems don't just evaluate content — they evaluate who created it. Strong personal brands are more likely to be cited, trusted, and remembered.\"},\n        {isParagraph:true, text:\"Personal branding in SEO is the process of positioning yourself as a trusted authority in your niche through consistent content, visibility, and expertise. It goes beyond ranking pages and building backlinks — it focuses on reputation, expertise signals, and digital footprint.\"},\n        {isHeading:true, text:'Core elements of a strong SEO personal brand'},\n        {isList:true, items:[\n          {n:'1', lead:'Consistent content publishing.', rest:'Regular case studies, insights, and practical strategies across your site, LinkedIn, and Medium.'},\n          {n:'2', lead:'Niche positioning.', rest:\"Specialize — technical SEO, local SEO, AI SEO — rather than covering everything, which builds deeper authority faster.\"},\n          {n:'3', lead:'Entity building.', rest:'Consistent name formatting, an About page, and Person schema help search engines and AI tools treat you as a defined entity.'},\n          {n:'4', lead:'Thought leadership content.', rest:'Original frameworks, real results, and unique perspectives increase trust and shareability over generic content.'}\n        ]},\n        {isQuote:true, text:'If your name appears across multiple platforms, your chances of being cited increase significantly.'},\n        {isHeading:true, text:'Building it step by step'},\n        {isList:true, items:[\n          {n:'1', lead:'Create foundational pages.', rest:'An About page, case studies, and a services page establish your baseline presence.'},\n          {n:'2', lead:'Publish authority content.', rest:'Start with pieces like \"My SEO Process,\" case study results, and common mistakes to avoid.'},\n          {n:'3', lead:'Distribute beyond your website.', rest:'Repurpose content into LinkedIn posts, articles, and short-form content.'},\n          {n:'4', lead:'Build mentions.', rest:'Getting your name mentioned across blogs, forums, and social platforms strengthens authority in both SEO and AI platforms.'}\n        ]},\n        {isHeading:true, text:'Common mistakes to avoid'},\n        {isParagraph:true, text:\"Inconsistent branding across platforms, posting without a clear strategy, copying generic content, and ignoring your off-site presence are the most common ways personal branding efforts stall out before they compound.\"},\n        {isLinkedParagraph:true, segments:[{plain:true, text:'For the broader system this fits into, see my '},{href:'/blog', text:'multi-platform SEO strategy guide'},{plain:true, text:'.'}]}\n      ],\n      faqs:[\n        {q:'What is personal branding in SEO?', a:'Positioning yourself as a trusted authority in your niche through consistent content, visibility, and expertise — reputation and digital footprint, not just rankings and backlinks.'},\n        {q:'Why does personal branding matter for AI platforms?', a:'AI systems like ChatGPT and Gemini evaluate who created content, prioritizing recognizable authors and consistent, credible sources when deciding what to cite.'},\n        {q:'How do I start building my personal brand?', a:'Create foundational pages (About, case studies, services), publish authority content regularly, and distribute it across platforms like LinkedIn.'},\n        {q:'What is entity building?', a:'Establishing yourself as a defined entity to search engines and AI tools through consistent name formatting, an About page, and Person structured data.'},\n        {q:'How important is niche positioning?', a:\"Specializing in a narrower area (like technical SEO or local SEO) builds deeper authority faster than trying to cover everything.\"}\n      ],\n      references:[\n        {n:1, label:'Multi-Platform SEO Strategy Guide', source:'darrelpontejo.com', href:'/blog'},\n        {n:2, label:'The Future of Search: A Complete Guide to SEO and AI Platforms in 2026', source:'darrelpontejo.com', href:'/blog'}\n      ]\n    }\n  };\n\n  _initNetworkBg(canvas, opts = {}) {\n    const ctx = canvas.getContext('2d');\n    const colors = opts.colors || ['#4fd8ff', '#7fe89a', '#c8e83a'];\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    let particles = [], raf, w, h;\n    function resize() {\n      const rect = canvas.parentElement.getBoundingClientRect();\n      w = canvas.width = Math.max(1, rect.width * dpr);\n      h = canvas.height = Math.max(1, rect.height * dpr);\n      canvas.style.width = rect.width + 'px';\n      canvas.style.height = rect.height + 'px';\n      const count = opts.count || Math.max(14, Math.floor((rect.width * rect.height) / 26000));\n      particles = Array.from({ length: count }, () => ({\n        x: Math.random() * w, y: Math.random() * h,\n        vx: (Math.random() - 0.5) * 0.3 * dpr, vy: (Math.random() - 0.5) * 0.3 * dpr,\n        r: (Math.random() * 2 + 1.5) * dpr,\n        c: colors[Math.floor(Math.random() * colors.length)]\n      }));\n    }\n    function step() {\n      ctx.clearRect(0, 0, w, h);\n      const linkDist = (opts.linkDist || 130) * dpr;\n      for (let i = 0; i < particles.length; i++) {\n        const p = particles[i];\n        p.x += p.vx; p.y += p.vy;\n        if (p.x < 0 || p.x > w) p.vx *= -1;\n        if (p.y < 0 || p.y > h) p.vy *= -1;\n      }\n      for (let i = 0; i < particles.length; i++) {\n        for (let j = i + 1; j < particles.length; j++) {\n          const a = particles[i], b = particles[j];\n          const dx = a.x - b.x, dy = a.y - b.y;\n          const d = Math.sqrt(dx * dx + dy * dy);\n          if (d < linkDist) {\n            ctx.strokeStyle = a.c;\n            ctx.globalAlpha = (1 - d / linkDist) * 0.32;\n            ctx.lineWidth = dpr;\n            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();\n          }\n        }\n      }\n      ctx.globalAlpha = 1;\n      for (const p of particles) {\n        ctx.beginPath();\n        ctx.fillStyle = p.c;\n        ctx.shadowColor = p.c;\n        ctx.shadowBlur = 7 * dpr;\n        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);\n        ctx.fill();\n      }\n      ctx.shadowBlur = 0;\n      raf = requestAnimationFrame(step);\n    }\n    resize(); step();\n    const onResize = () => resize();\n    window.addEventListener('resize', onResize);\n    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', onResize); };\n  }\n\n  componentDidMount() {\n    if (this.pageCanvasRef.current) this._cleanups.push(this._initNetworkBg(this.pageCanvasRef.current, { colors: ['#4fd8ff', '#7fe89a', '#bfe83a'] }));\n    this._forceMeta();\n  }\n\n  _forceMeta() {\n    const parts = window.location.pathname.split('/').filter(Boolean);\n    const idx = parts.indexOf('article');\n    const pathSlug = idx >= 0 ? parts[idx + 1] : null;\n    const slug = pathSlug || new URLSearchParams(window.location.search).get('slug') || 'google-may-2026-core-update';\n    const article = this.articles[slug];\n    if (!article) return;\n    document.title = article.metaTitle + ' | Darrel Pontejo';\n    const setMeta = (sel, attr, val) => { const el = document.querySelector(sel); if (el) el.setAttribute(attr, val); };\n    setMeta('meta[name=\"description\"]', 'content', article.description);\n    setMeta('link[rel=\"canonical\"]', 'href', article.canonical);\n    setMeta('meta[property=\"og:title\"]', 'content', article.metaTitle);\n    setMeta('meta[property=\"og:description\"]', 'content', article.description);\n    setMeta('meta[property=\"og:url\"]', 'content', article.canonical);\n    setMeta('meta[property=\"og:image\"]', 'content', article.heroImage);\n  }\n\n  componentWillUnmount() {\n    this._cleanups.forEach(fn => fn());\n  }\n\n  renderVals() {\n    const parts = window.location.pathname.split('/').filter(Boolean);\n    const idx = parts.indexOf('article');\n    const pathSlug = idx >= 0 ? parts[idx + 1] : null;\n    const slug = pathSlug || new URLSearchParams(window.location.search).get('slug') || 'google-may-2026-core-update';\n    const article = this.articles[slug] || this.articles['google-may-2026-core-update'];\n    const related = (article.relatedSlugs || []).map(s => ({ ...this.posts[s], href: `article/${s}` }));\n\n    const schema = {\n      '@context': 'https://schema.org',\n      '@graph': [\n        {\n          '@type': 'Article',\n          headline: article.title,\n          description: article.description,\n          image: article.heroImage,\n          datePublished: article.publishedTime,\n          dateModified: article.modifiedTime,\n          author: { '@type': 'Person', name: 'Darrel Pontejo', url: 'https://darrelpontejo.com' },\n          publisher: { '@type': 'Person', name: 'Darrel Pontejo' },\n          mainEntityOfPage: { '@type': 'WebPage', '@id': article.canonical }\n        },\n        {\n          '@type': 'BreadcrumbList',\n          itemListElement: [\n            { '@type': 'ListItem', position: 1, name: 'Home', item: 'https://darrelpontejo.com/' },\n            { '@type': 'ListItem', position: 2, name: 'Blog', item: 'https://darrelpontejo.com/blog/' },\n            { '@type': 'ListItem', position: 3, name: article.title }\n          ]\n        },\n        {\n          '@type': 'FAQPage',\n          mainEntity: article.faqs.map(f => ({ '@type': 'Question', name: f.q, acceptedAnswer: { '@type': 'Answer', text: f.a } }))\n        }\n      ]\n    };\n\n    return {\n      menuOpen: this.state.menuOpen,\n      menuIcon: this.state.menuOpen ? '✕' : '☰',\n      toggleMenu: () => this.setState(s => ({menuOpen: !s.menuOpen})),\n      pageCanvasRef: this.pageCanvasRef,\n      article,\n      related,\n      schemaJson: JSON.stringify(schema)\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
