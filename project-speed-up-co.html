  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

142);font-size:14px;font-weight:600;padding:10px 20px;border-radius:100px\">Let's Talk<\u002Fa>\n    <\u002Fdiv>\n    <button onclick=\"{{ toggleMenu }}\" style=\"display:none;background:none;border:none;color:oklch(0.95 0.01 260);font-size:24px;cursor:pointer\" class=\"dp-menu-btn\">{{ menuIcon }}<\u002Fbutton>\n  <\u002Fdiv>\n  <sc-if value=\"{{ menuOpen }}\">\n    <div style=\"border-top:1px solid oklch(1 0 0 / 0.08);padding:20px 24px;display:flex;flex-direction:column;gap:18px\">\n      <a href=\"index\" style=\"color:oklch(0.7 0.015 260);font-size:15px;font-weight:500\">Home<\u002Fa>\n      <a href=\"portfolio\" style=\"color:oklch(0.95 0.01 260);font-size:15px;font-weight:500\">Portfolio<\u002Fa>\n      <a href=\"blog\" style=\"color:oklch(0.7 0.015 260);font-size:15px;font-weight:500\">Blog<\u002Fa>\n      <a href=\"index#contact\" style=\"color:oklch(0.84 0.19 142);font-size:15px;font-weight:600\">Let's Talk →<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n\n<section class=\"dp-wrap\" style=\"max-width:900px;margin:0 auto;padding:150px 24px 0\">\n  <a href=\"portfolio\" style=\"font-family:'JetBrains Mono',monospace;font-size:13px;color:oklch(0.65 0.015 260)\">← Back to portfolio<\u002Fa>\n  <div style=\"margin:28px 0 16px\">\n    <span style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.84 0.19 142);background:oklch(0.84 0.19 142 / 0.1);border:1px solid oklch(0.84 0.19 142 / 0.25);padding:5px 11px;border-radius:100px\">{{ project.badge }}<\u002Fspan>\n  <\u002Fdiv>\n  <h1 style=\"font-family:'Space Grotesk',sans-serif;font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-0.02em;line-height:1.12;margin:0 0 24px\">{{ project.title }}<\u002Fh1>\n  <div class=\"dp-meta-row\" style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:24px 0;border-top:1px solid oklch(1 0 0 / 0.08);border-bottom:1px solid oklch(1 0 0 / 0.08);margin-bottom:44px\">\n    <div><div style=\"font-size:11.5px;color:oklch(0.55 0.015 260);margin-bottom:4px\">Client<\u002Fdiv><div style=\"font-size:14px;font-weight:600\">{{ project.client }}<\u002Fdiv><\u002Fdiv>\n    <div><div style=\"font-size:11.5px;color:oklch(0.55 0.015 260);margin-bottom:4px\">Role<\u002Fdiv><div style=\"font-size:14px;font-weight:600\">{{ project.role }}<\u002Fdiv><\u002Fdiv>\n    <div><div style=\"font-size:11.5px;color:oklch(0.55 0.015 260);margin-bottom:4px\">Timeline<\u002Fdiv><div style=\"font-size:14px;font-weight:600\">{{ project.timeline }}<\u002Fdiv><\u002Fdiv>\n    <div><div style=\"font-size:11.5px;color:oklch(0.55 0.015 260);margin-bottom:4px\">Industry<\u002Fdiv><div style=\"font-size:14px;font-weight:600\">{{ project.industry }}<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"max-width:1100px;margin:0 auto;padding:0 24px 60px\">\n  <div style=\"aspect-ratio:21/9;border-radius:18px;background:{{ project.chipBg }};border:1px solid oklch(1 0 0 / 0.08);display:flex;align-items:center;justify-content:center;padding:48px\">\n    <div role=\"img\" aria-label=\"{{ project.client }} logo\" style=\"width:40%;height:50%;background-image:url('{{ project.logo }}');background-size:contain;background-position:center;background-repeat:no-repeat\"><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"dp-wrap\" style=\"max-width:900px;margin:0 auto;padding:0 24px 60px;display:grid;grid-template-columns:repeat(3,1fr);gap:20px\">\n  <sc-for list=\"{{ project.stats }}\" as=\"s\" hint-placeholder-count=\"3\">\n    <div style=\"background:oklch(0.19 0.012 260);border:1px solid oklch(1 0 0 / 0.08);border-radius:14px;padding:22px;text-align:center\">\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;color:oklch(0.84 0.19 142)\">{{ s.val }}<\u002Fdiv>\n      <div style=\"font-size:12.5px;color:oklch(0.62 0.015 260);margin-top:6px\">{{ s.label }}<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n<\u002Fsection>\n\n<section class=\"dp-wrap\" style=\"max-width:900px;margin:0 auto;padding:0 24px 100px\">\n  <sc-for list=\"{{ project.sections }}\" as=\"sec\" hint-placeholder-count=\"3\">\n    <div style=\"margin-bottom:40px\">\n      <h2 style=\"font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:600;margin:0 0 14px\">{{ sec.title }}<\u002Fh2>\n      <p style=\"font-size:15.5px;line-height:1.7;color:oklch(0.72 0.015 260);margin:0\">{{ sec.body }}<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsc-for>\n\n  <div class=\"dp-gallery\" style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;margin-top:40px\">\n    <sc-for list=\"{{ project.gallery }}\" as=\"g\" hint-placeholder-count=\"3\">\n      <div>\n        <x-import component-from-global-scope=\"image-slot\" from=\"77198934-e091-4973-926f-971dc078e5b3#/image-slot.js\" id=\"{{ g.id }}\" shape=\"rounded\" radius=\"12\" placeholder=\"{{ g.caption }}\" src=\"{{ g.mock }}\" style=\"aspect-ratio:4/3\" hint-size=\"100%,100%\"><\u002Fx-import>\n        <div style=\"font-size:12px;color:oklch(0.55 0.015 260);margin-top:8px;text-align:center\">{{ g.caption }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section style=\"max-width:1100px;margin:0 auto;padding:0 24px 100px\">\n  <a href=\"portfolio\" style=\"background:oklch(0.19 0.012 260);border:1px solid oklch(1 0 0 / 0.08);border-radius:16px;padding:28px;display:flex;align-items:center;justify-content:space-between;color:oklch(0.95 0.01 260)\" style-hover=\"border-color:oklch(0.84 0.19 142 / 0.4)\">\n    <div>\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11.5px;color:oklch(0.55 0.015 260);margin-bottom:6px\">NEXT PROJECT<\u002Fdiv>\n      <div style=\"font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:600\">View all portfolio work<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"font-size:22px;color:oklch(0.84 0.19 142)\">→<\u002Fdiv>\n  <\u002Fa>\n<\u002Fsection>\n\n<footer style=\"border-top:1px solid oklch(1 0 0 / 0.08);padding:32px 24px\">\n  <div style=\"max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:16px\">\n    <div style=\"font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:15px\">Darrel<span style=\"color:oklch(0.84 0.19 142)\">.<\u002Fspan>Pontejo<\u002Fdiv>\n    <div style=\"font-size:13px;color:oklch(0.55 0.015 260)\">© 2026 Darrel Pontejo. Davao City, Philippines.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = { menuOpen: false };\n\n  pageCanvasRef = React.createRef();\n  _cleanups = [];\n\n  projects = {\n    'mara-diamonds': {\n      badge:'SEO · Shopify', title:'Mara Diamonds — Shopify SEO Overhaul',\n      metaTitle:'Shopify SEO Case Study: +142% Organic Sessions',\n      desc:'How a Shopify theme rebuild and on-page SEO restructure grew organic sessions 142% and cut bounce rate 38% for a jewelry eCommerce brand.',\n      keywords:'Shopify SEO case study',\n      client:'Mara Diamonds', role:'Shopify Dev + SEO', timeline:'2026', industry:'eCommerce · Jewelry',\n      logo:'https://maradiamonds.com/cdn/shop/files/Mara_Co_Logo_20b00284-7e29-421c-b99c-d449c0266ff2.png', chipBg:'oklch(0.97 0.005 260)',\n      stats:[{val:'+142%', label:'Organic sessions'}, {val:'-38%', label:'Bounce rate'}, {val:'top 3', label:'Priority keyword rankings'}],\n      sections:[\n        {title:'The challenge', body:'The Shopify theme was slow, hard to maintain, and built on a rigid template that made it difficult to update collections, add new product features, or keep pages performant as the catalog grew.'},\n        {title:'The approach', body:'Rebuilt key theme templates and sections with custom Liquid and JS, restructured collection and product pages for faster load times, and set up a component-based system so new pages could be shipped without touching core theme code.'},\n        {title:'The results', body:'Page speed and Core Web Vitals improved significantly, collection and product pages became easier to update, and the faster, cleaner build supported the 142% lift in organic sessions and 38% drop in bounce rate.'}\n      ],\n      gallery:[{id:'mara-1', mock:'/assets/screens/mara-homepage.png', caption:'Homepage redesign'}, {id:'mara-2', mock:'/assets/screens/mara-collection.png', caption:'Collection page'}]\n    },\n    'patrola-law': {\n      badge:'PPC · Legal', title:'Patrola Law — Lead Gen Campaign (SEO + Google Ads)',\n      metaTitle:'Law Firm SEO Case Study: 64% More Qualified Leads',\n      desc:'A dedicated MSB registration landing page and targeted on-page SEO cut cost per lead 38% and grew qualified leads 64% for a Canadian law firm.',\n      keywords:'law firm SEO case study',\n      client:'Patrola Law', role:'Google Ads + SEO', timeline:'2025', industry:'Legal Services',\n      logo:'https://patrolalaw.com/wp-content/uploads/2016/06/logo-1.png', chipBg:'oklch(0.97 0.005 260)',\n      stats:[{val:'-38%', label:'Cost per lead'}, {val:'+64%', label:'Qualified leads'}, {val:'+2.1x', label:'Consultation bookings'}],\n      sections:[\n        {title:'The challenge', body:'Patrola Law had no dedicated content targeting Canadian MSB (Money Services Business) registration, a high-value niche practice area with real search demand but no page built to capture it.'},\n        {title:'The approach', body:'Built a dedicated MSB registration landing page targeting the practice area directly, optimized on-page SEO around terms like \"money service business canada,\" and reinforced supporting pages like notice of articles and incorporation lawyer.'},\n        {title:'The results', body:'The MSB registration page now drives 31% of the site\\'s organic traffic, with \"notice of articles\" and \"patrola law\" ranking #1 and \"incorporation lawyer\" ranking #3 — turning a previously untapped niche into a lead-generating page.'}\n      ],\n      gallery:[{id:'patrola-1', mock:'/assets/screens/patrola-landing.png', caption:'MSB landing page'}, {id:'patrola-2', mock:'/assets/screens/patrola-ranking.png', caption:'Ranking screenshot'}]\n    },\n    'global-staff-network': {\n      badge:'Technical SEO · Outsourcing', title:'Global Staff Network — Technical SEO Audit & Fix',\n      metaTitle:'Technical SEO Case Study: 91% Fewer Crawl Errors',\n      desc:'A full technical SEO audit and fix cut crawl errors 91% and grew indexed pages 58%, helping an outsourcing brand rank #1 for key search terms.',\n      keywords:'technical SEO case study',\n      client:'Global Staff Network', role:'Technical SEO Audit', timeline:'2025', industry:'BPO · Recruitment',\n      logo:'https://globalstaffnetwork.com/wp-content/uploads/2025/11/Global-Staff-Network-Logo-1.webp', chipBg:'oklch(0.97 0.005 260)',\n      stats:[{val:'40+', label:'Sites optimized'}, {val:'-91%', label:'Crawl errors'}, {val:'+58%', label:'Indexed pages'}],\n      sections:[\n        {title:'The challenge', body:'A full SEO audit flagged 10 critical and 2 minor issues, with on-page SEO scoring just 60% — holding back an outsourcing brand competing for terms like \"outsourcing companies in Australia\" and \"offshoring to Philippines.\"'},\n        {title:'The approach', body:'Fixed the critical on-page and technical issues from the audit, and rebuilt the core Services page copy and structure around the target keywords driving outsourcing and offshoring searches.'},\n        {title:'The results', body:'\"Offshoring to Philippines\" now ranks #1, \"outsourcing companies in Australia\" ranks #6, and the Services page alone drives 67% of the site\\'s organic traffic across its top US, Philippines, and Australia markets.'}\n      ],\n      gallery:[{id:'gsn-1', mock:'/assets/screens/gsn-service.png', caption:'Services page'}, {id:'gsn-2', mock:'/assets/screens/gsn-audit.png', caption:'SEO audit'}, {id:'gsn-3', mock:'/assets/screens/gsn-ranking.png', caption:'Ranking screenshot'}]\n    },\n    'significant': {\n      badge:'SEO · Digital Strategy', title:'Significant.com.au — Local SEO Strategy',\n      metaTitle:'Local SEO Case Study: +95% Organic Visibility',\n      desc:'A Melbourne marketing agency grew organic visibility 95% and ranking keywords 70% after fixing critical on-page and off-page SEO issues.',\n      keywords:'local SEO case study',\n      client:'Significant', role:'SEO & Content Strategy', timeline:'2025', industry:'Marketing Agency',\n      logo:'https://significant.com.au/wp-content/uploads/2023/06/newlogo.png', chipBg:'oklch(0.97 0.005 260)',\n      stats:[{val:'+95%', label:'Organic visibility'}, {val:'+70%', label:'Ranking keywords'}, {val:'+41%', label:'Organic conversions'}],\n      sections:[\n        {title:'The challenge', body:'An SEO audit put Significant at 55/100, flagging 8 critical and 2 minor issues, with weak off-page signals (50%) and social presence (40%) limiting visibility for a Melbourne SEO & Google Ads agency.'},\n        {title:'The approach', body:'Addressed the critical on-page and off-page issues from the audit, strengthened content around target service keywords like \"facebook marketing strategists,\" and built out supporting content pages.'},\n        {title:'The results', body:'\"Significant\" now ranks #15 for 3.6K monthly searches, \"facebook marketing strategists\" ranks #9, and one content page alone drives 100% of the site\\'s organic traffic.'}\n      ],\n      gallery:[{id:'sig-1', mock:'/assets/screens/sig-homepage.png', caption:'Homepage'}, {id:'sig-2', mock:'/assets/screens/sig-audit.png', caption:'SEO audit'}, {id:'sig-3', mock:'/assets/screens/sig-ranking.png', caption:'Ranking screenshot'}]\n    },\n    'lagerstein': {\n      badge:'WordPress · Music', title:'Lagerstein.com — WordPress Band Site Rebuild',\n      metaTitle:'WordPress Rebuild Case Study: 3x Site Traffic',\n      desc:'A lean WordPress rebuild and image/script optimization tripled site traffic, cut load time 52%, and grew tour page visits 120% for a touring band.',\n      keywords:'WordPress website rebuild case study',\n      client:'Lagerstein', role:'WordPress Dev + SEO', timeline:'2025', industry:'Music · Entertainment',\n      logo:'https://www.lagerstein.com/wp-content/uploads/2025/08/logo-lagerstein-1920x685-1.png', chipBg:'oklch(0.13 0.012 260)',\n      stats:[{val:'+3x', label:'Site traffic'}, {val:'-52%', label:'Load time'}, {val:'+120%', label:'Tour page visits'}],\n      sections:[\n        {title:'The challenge', body:'An outdated WordPress build was slow to load and poorly indexed, making it hard for fans to find tour dates and music links via search.'},\n        {title:'The approach', body:'Rebuilt the site on a lean WordPress theme, optimized images and scripts for load time, and restructured tour and music pages for search visibility.'},\n        {title:'The results', body:'Site traffic tripled, load time dropped 52%, and tour page visits jumped 120% ahead of new show announcements.'}\n      ],\n      gallery:[{id:'lager-1', mock:'/assets/screens/lager-1.png', caption:'Homepage'}, {id:'lager-2', mock:'/assets/screens/lager-2.png', caption:'Tour page'}, {id:'lager-3', mock:'/assets/screens/lager-3.png', caption:'Load time report'}]\n    },\n    'speed-up-co': {\n      badge:'PPC · Virtual Assistants', title:'The Speed Up Co — Multi-Channel Campaigns',\n      metaTitle:'Multi-Channel Marketing Case Study: +61% ROI',\n      desc:'Standardized SEO, PPC, and web-build workflows lifted average campaign ROI 61% and lead volume 44% across 50+ managed client projects.',\n      keywords:'multi-channel marketing case study',\n      client:'The Speed Up Co', role:'SEO, PPC & Web Builds', timeline:'2024–2025', industry:'Virtual Assistant Services',\n      logo:'data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22400%22%20height%3D%22120%22%3E%3Ctext%20x%3D%2250%25%22%20y%3D%2255%25%22%20font-family%3D%22Space%20Grotesk%2C%20Arial%2C%20sans-serif%22%20font-weight%3D%22700%22%20font-size%3D%2230%22%20fill%3D%22%23202030%22%20text-anchor%3D%22middle%22%20dominant-baseline%3D%22middle%22%3EThe%20Speed%20Up%20Co%3C%2Ftext%3E%3C%2Fsvg%3E', chipBg:'oklch(0.97 0.005 260)',\n      stats:[{val:'+61%', label:'Campaign ROI'}, {val:'50+', label:'Client projects managed'}, {val:'+44%', label:'Lead volume'}],\n      sections:[\n        {title:'The challenge', body:'Managing SEO, PPC, and web builds across a growing roster of client projects without a repeatable process for reporting and optimization.'},\n        {title:'The approach', body:'Standardized SEO and PPC workflows across client accounts, ran ongoing campaign optimization, and delivered new web builds for clients scaling their outsourcing offer.'},\n        {title:'The results', body:'Average campaign ROI rose 61% and lead volume grew 44% across 50+ managed client projects.'}\n      ],\n      gallery:[{id:'speedup-1', mock:'/assets/screens/speedup-1.png', caption:'Landing page'}, {id:'speedup-2', mock:'/assets/screens/speedup-2.png', caption:'Campaign dashboard'}, {id:'speedup-3', mock:'/assets/screens/speedup-3.png', caption:'Client site build'}]\n    }\n  };\n\n  _initNetworkBg(canvas, opts = {}) {\n    const ctx = canvas.getContext('2d');\n    const colors = opts.colors || ['#4fd8ff', '#7fe89a', '#c8e83a'];\n    const dpr = Math.min(window.devicePixelRatio || 1, 2);\n    let particles = [], raf, w, h;\n    function resize() {\n      const rect = canvas.parentElement.getBoundingClientRect();\n      w = canvas.width = Math.max(1, rect.width * dpr);\n      h = canvas.height = Math.max(1, rect.height * dpr);\n      canvas.style.width = rect.width + 'px';\n      canvas.style.height = rect.height + 'px';\n      const count = opts.count || Math.max(14, Math.floor((rect.width * rect.height) / 26000));\n      particles = Array.from({ length: count }, () => ({\n        x: Math.random() * w, y: Math.random() * h,\n        vx: (Math.random() - 0.5) * 0.3 * dpr, vy: (Math.random() - 0.5) * 0.3 * dpr,\n        r: (Math.random() * 2 + 1.5) * dpr,\n        c: colors[Math.floor(Math.random() * colors.length)]\n      }));\n    }\n    function step() {\n      ctx.clearRect(0, 0, w, h);\n      const linkDist = (opts.linkDist || 130) * dpr;\n      for (let i = 0; i < particles.length; i++) {\n        const p = particles[i];\n        p.x += p.vx; p.y += p.vy;\n        if (p.x < 0 || p.x > w) p.vx *= -1;\n        if (p.y < 0 || p.y > h) p.vy *= -1;\n      }\n      for (let i = 0; i < particles.length; i++) {\n        for (let j = i + 1; j < particles.length; j++) {\n          const a = particles[i], b = particles[j];\n          const dx = a.x - b.x, dy = a.y - b.y;\n          const d = Math.sqrt(dx * dx + dy * dy);\n          if (d < linkDist) {\n            ctx.strokeStyle = a.c;\n            ctx.globalAlpha = (1 - d / linkDist) * 0.32;\n            ctx.lineWidth = dpr;\n            ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();\n          }\n        }\n      }\n      ctx.globalAlpha = 1;\n      for (const p of particles) {\n        ctx.beginPath();\n        ctx.fillStyle = p.c;\n        ctx.shadowColor = p.c;\n        ctx.shadowBlur = 7 * dpr;\n        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);\n        ctx.fill();\n      }\n      ctx.shadowBlur = 0;\n      raf = requestAnimationFrame(step);\n    }\n    resize(); step();\n    const onResize = () => resize();\n    window.addEventListener('resize', onResize);\n    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', onResize); };\n  }\n\n  componentDidMount() {\n    if (this.pageCanvasRef.current) this._cleanups.push(this._initNetworkBg(this.pageCanvasRef.current, { colors: ['#4fd8ff', '#7fe89a', '#bfe83a'] }));\n    this._forceMeta();\n  }\n\n  _forceMeta() {\n    const parts = window.location.pathname.split('/').filter(Boolean);\n    const idx = parts.indexOf('project');\n    const pathSlug = idx >= 0 ? parts[idx + 1] : null;\n    const slug = pathSlug || new URLSearchParams(window.location.search).get('slug') || 'mara-diamonds';\n    const project = this.projects[slug];\n    if (!project) return;\n    document.title = project.metaTitle + ' | Darrel Pontejo Portfolio';\n    const setMeta = (sel, attr, val) => { const el = document.querySelector(sel); if (el) el.setAttribute(attr, val); };\n    setMeta('meta[name=\"description\"]', 'content', project.desc);\n    setMeta('meta[name=\"keywords\"]', 'content', project.keywords);\n    setMeta('meta[property=\"og:title\"]', 'content', project.title);\n    setMeta('meta[property=\"og:description\"]', 'content', project.desc);\n  }\n\n  componentWillUnmount() {\n    this._cleanups.forEach(fn => fn());\n  }\n\n  renderVals() {\n    const parts = window.location.pathname.split('/').filter(Boolean);\n    const idx = parts.indexOf('project');\n    const pathSlug = idx >= 0 ? parts[idx + 1] : null;\n    const slug = pathSlug || new URLSearchParams(window.location.search).get('slug') || 'mara-diamonds';\n    const project = this.projects[slug] || this.projects['mara-diamonds'];\n\n    const schema = {\n      '@context': 'https://schema.org',\n      '@graph': [\n        {\n          '@type': 'CreativeWork',\n          name: project.title,\n          description: project.desc,\n          image: project.logo,\n          about: project.client,\n          author: { '@type': 'Person', name: 'Darrel Pontejo', jobTitle: 'SEO & GEO Specialist, Digital Marketing Manager', url: 'https://darrelpontejo.com/' },\n          creator: { '@type': 'Person', name: 'Darrel Pontejo' },\n          workExample: { '@type': 'Organization', name: project.client },\n          url: `https://darrelpontejo.com/project/${slug}`\n        },\n        {\n          '@type': 'BreadcrumbList',\n          itemListElement: [\n            { '@type': 'ListItem', position: 1, name: 'Home', item: 'https://darrelpontejo.com/' },\n            { '@type': 'ListItem', position: 2, name: 'Portfolio', item: 'https://darrelpontejo.com/portfolio' },\n            { '@type': 'ListItem', position: 3, name: project.client }\n          ]\n        }\n      ]\n    };\n\n    return {\n      menuOpen: this.state.menuOpen,\n      menuIcon: this.state.menuOpen ? '✕' : '☰',\n      toggleMenu: () => this.setState(s => ({menuOpen: !s.menuOpen})),\n      pageCanvasRef: this.pageCanvasRef,\n      project,\n      schemaJson: JSON.stringify(schema)\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
